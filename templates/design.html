<!DOCTYPE html>
<html>
<head>
    <title>Minesweeper Trophy Race</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root { --p1: #3498db; --p2: #e74c3c; }
        body { background: #111; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        
        #lobby { margin-top: 100px; background: #222; padding: 40px; border-radius: 15px; display: inline-block; border: 1px solid #444; }
        
        .grid { display: grid; grid-template-columns: repeat(10, 38px); gap: 4px; background: #333; padding: 10px; border-radius: 10px; }
        .cell { width: 38px; height: 38px; background: #555; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; user-select: none; border-radius: 4px; transition: 0.1s; }
        .cell.revealed { background: #eee; color: #000; }
        .cell.flagged { background: #2c3e50; border: 1px solid #3498db; }
        
        .container { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-top: 20px; }
        .p1-area { border: 4px solid var(--p1); padding: 15px; border-radius: 15px; background: #181818; }
        .p2-area { border: 4px solid var(--p2); padding: 15px; border-radius: 15px; background: #181818; }

        #result-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; 
        }

        @keyframes shake { 0%, 100% {transform:translateX(0)} 20% {transform:translateX(-8px)} 40% {transform:translateX(8px)} 60% {transform:translateX(-8px)} 80% {transform:translateX(8px)} }
        .shake { animation: shake 0.4s ease-in-out; }

        input { padding: 12px; border-radius: 8px; border: 1px solid #555; background: #333; color: white; margin: 10px; width: 220px; outline: none; }
        button { padding: 12px 24px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: #27ae60; color: white; transition: 0.2s; }
        button:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="result-overlay">
        <h1 id="res-title" style="font-size: 80px; margin: 0;"></h1>
        <p id="res-body" style="font-size: 24px; color: #aaa; margin: 20px 0 40px;"></p>
        <button onclick="location.reload()" style="font-size: 20px;">PLAY AGAIN</button>
    </div>

    <div id="lobby">
        <h1>🏁 TROPHY RACE</h1>
        <input type="text" id="name" placeholder="Enter Your Nickname"><br>
        <button onclick="createRoom()">CREATE PRIVATE ROOM</button>
        <p style="color: #888;">— OR —</p>
        <input type="text" id="code-input" placeholder="Enter 4-Digit Code"><br>
        <button onclick="joinRoom()" style="background: #2980b9;">JOIN WITH CODE</button>
    </div>

    <div id="game-ui" style="display:none">
        <h2 id="display-code" style="color: #f1c40f; font-size: 32px;">CODE: ----</h2>
        <div id="timer" style="font-size: 45px; font-family: monospace; font-weight: bold; color: #fff;">00:00</div>
        <div class="container">
            <div id="area-p1" class="p1-area">
                <h3 id="n-p1">P1</h3><div id="grid-p1" class="grid"></div>
            </div>
            <div id="area-p2" class="p2-area">
                <h3 id="n-p2">P2</h3><div id="grid-p2" class="grid"></div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let myRole, myRoom;

        function createRoom() {
            const n = document.getElementById('name').value;
            if(n) socket.emit('create_room', {name: n});
        }

        function joinRoom() {
            const n = document.getElementById('name').value;
            const c = document.getElementById('code-input').value;
            if(n && c) socket.emit('join_room_request', {name: n, code: c});
        }

        socket.on('room_joined', d => {
            myRole = d.role;
            myRoom = d.code;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('display-code').innerText = "ROOM CODE: " + d.code;
        });

        // Setup Grids
        ['p1', 'p2'].forEach(p => {
            const g = document.getElementById(`grid-${p}`);
            for(let r=0; r<10; r++) for(let c=0; c<10; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell'; cell.id = `${p}-${r}-${c}`;
                
                cell.onclick = () => {
                    if(myRole === p && !cell.classList.contains('revealed') && !cell.classList.contains('flagged'))
                        socket.emit('cell_clicked', {code: myRoom, player: p, row: r, col: c});
                };
                cell.oncontextmenu = (e) => {
                    e.preventDefault();
                    if(myRole === p && !cell.classList.contains('revealed')) {
                        cell.classList.toggle('flagged');
                        cell.innerText = cell.classList.contains('flagged') ? "🚩" : "";
                    }
                };
                g.appendChild(cell);
            }
        });

        socket.on('update_names', n => {
            document.getElementById('n-p1').innerText = n.p1;
            document.getElementById('n-p2').innerText = n.p2;
        });

        socket.on('start_timer', () => {
            let s = 0; setInterval(() => { s++; document.getElementById('timer').innerText = s + "s"; }, 1000);
        });

        socket.on('reveal_batch', d => {
            const cell = document.getElementById(`${d.player}-${d.cells[0].r}-${d.cells[0].c}`);
            cell.classList.add('revealed');
            cell.classList.remove('flagged');
            cell.innerText = d.cells[0].v === 'T' ? "🏆" : (d.cells[0].v || "");
            if(d.cells[0].v === 'T') cell.style.background = "#f1c40f";
        });

        socket.on('player_reset', d => {
            const area = document.getElementById(`area-${d.player}`);
            area.classList.add('shake');
            setTimeout(() => area.classList.remove('shake'), 450);
            document.querySelectorAll(`[id^="${d.player}-"]`).forEach(c => {
                c.className = 'cell'; c.innerText = ""; c.style.background = "";
            });
        });

        socket.on('game_over', d => {
            const overlay = document.getElementById('result-overlay');
            overlay.style.display = 'flex';
            const title = document.getElementById('res-title');
            if (d.winner_role === myRole) {
                title.innerText = "VICTORY! 🏆"; title.style.color = "#2ecc71";
            } else {
                title.innerText = "DEFEAT... 💀"; title.style.color = "#e74c3c";
            }
            document.getElementById('res-body').innerText = `${d.winner_name} found the Trophy in ${d.time}s`;
        });

        socket.on('error_msg', d => alert(d.msg));
    </script>
</body>
</html>
